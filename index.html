<div id="chatbox" style="width:100%; max-width:400px; border:1px solid #ccc; border-radius:10px; padding:10px; font-family:Arial;">
  <div id="messages" style="height:300px; overflow-y:auto; border-bottom:1px solid #ccc; margin-bottom:10px;"></div>
  
  <input id="userInput" type="text" placeholder="Type your message..." 
         style="width:75%; padding:8px;" />
  
  <button onclick="sendMessage()" style="padding:8px;">Send</button>
</div>

<script>
function sendMessage() {
  let input = document.getElementById("userInput");
  let msg = input.value.trim();
  if(msg === "") return;

  let messages = document.getElementById("messages");
  
  messages.innerHTML += "<p><b>You:</b> " + msg + "</p>";
  
  let reply = getBotReply(msg);
  messages.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";
  
  input.value = "";
  messages.scrollTop = messages.scrollHeight;
}

function getBotReply(input) {
  input = input.toLowerCase();

  if(input.includes("hello")) return "Hello! How can I help you?";
  if(input.includes("sensor")) return "Sensors convert physical parameters into signals.";
  if(input.includes("assignment")) return "Please upload assignments in the Canvas/Moodle assignment section.";
  if(input.includes("thank")) return "You're welcome! 😊";

  return "I am a simple chatbot. Please try another question.";
}
</script>
